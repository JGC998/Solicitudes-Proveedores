<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notificaciones — RFQ Manager</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="mobile-bar">
  <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
  <span class="mobile-brand">RFQ Manager</span>
  <div style="width:40px"></div>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">📋</div>
      <span class="brand-name">RFQ Manager</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard.html" class="nav-item"><span class="nav-icon">⊞</span> Dashboard</a>
      <a href="/admin/solicitudes.html" class="nav-item"><span class="nav-icon">📄</span> Solicitudes</a>
      <a href="/admin/nueva-solicitud.html" class="nav-item"><span class="nav-icon">＋</span> Nueva solicitud</a>
      <a href="/admin/analisis.html" class="nav-item"><span class="nav-icon">📊</span> Análisis & KPIs</a>
      <p class="sidebar-section-label">Configuración</p>
      <a href="/admin/productos.html" class="nav-item"><span class="nav-icon">📦</span> Catálogo</a>
      <a href="/admin/proveedores.html" class="nav-item"><span class="nav-icon">👥</span> Proveedores</a>
      <a href="/admin/logs.html" class="nav-item"><span class="nav-icon">📜</span> Actividad</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-info-sidebar">
          <div class="user-name-sidebar" id="user-name">Cargando...</div>
          <div class="user-role-sidebar" id="user-role">—</div>
        </div>
      </div>
      <a href="/perfil.html" class="sidebar-perfil-link">⚙ Mi perfil</a>
      <button class="logout-btn" id="logout-btn">Cerrar sesión</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Notificaciones</h1>
        <p class="page-subtitle">Eventos y avisos del sistema</p>
      </div>
      <button class="btn btn-secondary" id="btn-leer" onclick="marcarLeidas()">✓ Marcar todas como leídas</button>
    </div>

    <div class="page-body" style="max-width:680px">
      <div id="loading" class="loading"><div class="spinner"></div> Cargando...</div>
      <div id="content" class="hidden"></div>
    </div>
  </main>
</div>

<script src="/js/ui.js"></script>
<script>
const TIPO_ICONS = {
  nueva_cotizacion: '💬', nueva_solicitud: '📄', adjudicado: '👑',
  no_adjudicado: '❌', cuenta_aprobada: '✅', otros: '🔔'
};

let rolActual = 'admin';

async function init() {
  try {
    const me = await fetch('/api/auth/me');
    if (!me.ok) return (window.location.href = '/login.html');
    const { user } = await me.json();
    rolActual = user.rol;
    document.getElementById('user-name').textContent = user.nombre;
    document.getElementById('user-avatar').textContent = user.nombre[0].toUpperCase();
    document.getElementById('user-role').textContent = rolActual === 'admin' ? 'Administrador' : 'Proveedor';
    if (rolActual !== 'admin') {
      document.querySelector('.sidebar-nav').innerHTML = `
        <p class="sidebar-section-label">Proveedor</p>
        <a href="/proveedor/dashboard.html" class="nav-item"><span class="nav-icon">⊞</span> Mi panel</a>
        <a href="/proveedor/historial.html" class="nav-item"><span class="nav-icon">📋</span> Mis cotizaciones</a>
      `;
    }
    initHeader(rolActual);
  } catch { return (window.location.href = '/login.html'); }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  });

  await cargar();
}

async function cargar() {
  const res = await fetch('/api/notificaciones');
  const { notificaciones } = await res.json();

  const content = document.getElementById('content');
  if (notificaciones.length === 0) {
    content.innerHTML = `
      <div class="empty-state card">
        <div class="empty-state-icon">🔔</div>
        <div class="empty-state-title">Sin notificaciones</div>
        <p class="text-muted text-sm">Los avisos aparecerán aquí cuando haya actividad relevante.</p>
      </div>
    `;
  } else {
    content.innerHTML = notificaciones.map(n => {
      const icon = TIPO_ICONS[n.tipo] || TIPO_ICONS.otros;
      const fecha = new Date(n.fecha);
      const fechaStr = fecha.toLocaleDateString('es-ES') + ' ' + fecha.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
      const href = n.referencia_id
        ? (rolActual === 'admin' ? `/admin/detalle.html?id=${n.referencia_id}` : `/proveedor/cotizar.html?id=${n.referencia_id}`)
        : null;
      const link = href ? `<a href="${href}" class="btn btn-secondary btn-sm" style="margin-top:.5rem">Ver solicitud →</a>` : '';
      return `
        <div class="card mb-2" style="${!n.leida ? 'border-left:4px solid var(--primary)' : 'opacity:.75'}">
          <div class="card-body" style="padding:.9rem 1.2rem">
            <div style="display:flex;align-items:flex-start;gap:.8rem">
              <span style="font-size:1.3rem;line-height:1">${icon}</span>
              <div style="flex:1">
                <p style="margin:0;font-size:.9rem;${!n.leida?'font-weight:600':''}">${escapeHtml(n.mensaje)}</p>
                <p class="text-muted text-sm mt-1">${fechaStr}</p>
                ${link}
              </div>
              ${!n.leida ? '<span class="badge badge-info" style="flex-shrink:0">Nueva</span>' : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  document.getElementById('loading').classList.add('hidden');
  content.classList.remove('hidden');
}

async function marcarLeidas() {
  await fetch('/api/notificaciones/leer', { method: 'POST' });
  await cargar();
  initNotificaciones();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
